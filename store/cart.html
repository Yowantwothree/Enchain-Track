<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/globals.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body id="store-cart">
    <div class="dashboard">
        <header class="dashboard-header">
            <div class="header-logo">EnchainTrack</div>
            <div class="header-actions">
                <div class="profile">
                    <div class="profile-name">User</div>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="dashboard-sidebar">
                <div class="nav-links">
                    <button class="link">
                        <img class="nav-img" src="/img/home.png" />
                        <div class="nav-title">Home</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/browse.png" />
                        <div class="nav-title">Browse</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/cart.png" />
                        <div class="nav-title">Cart</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/order.png" />
                        <div class="nav-title">Order</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/business.png" />
                        <div class="nav-title">Business</div>
                    </button>
                </div>
                <div class="navigation-indicator" style="top: calc(25px + 65px * 2);"></div>
                <!--Adjust top to: 25px + 65*(order of link - 1)-->
            </div>


            <div class="dashboard-main-data" style="padding: 25px">
                <div class="store-background">
                    <div class="category-title">
                        <p class="home-deal-title">Cart</p>
                    </div>

                    <div class="cart-table">
                        
                        <div class="cart-table-wrapper">
                            <table class="product-table">
                                <thead>
                                    <tr>
                                        <th class="text-center">Qty</th>
                                        <th>Product</th>
                                        <th>Details</th>
                                        <th class="text-right">Price</th>
                                        <th class="text-center">Action</th>
                                    </tr>
                                </thead>
                                <tbody class="table-body">
                                </tbody>
                                <tfoot>
                                    <tr class="totals-row">
                                        <td colspan="3">Subtotal</td>
                                        <td colspan="2" class="text-right subtotal-value">---</td>
                                    </tr>
                                    <tr class="totals-row">
                                        <td colspan="3">Discount</td>
                                        <td colspan="2" class="text-right discount-value">---</td>
                                    </tr>
                                    <tr class="totals-row">
                                        <td colspan="3">Shipping</td>
                                        <td colspan="2" class="text-right shipping-value">---</td>
                                    </tr>
                                    <tr class="totals-row order-total">
                                        <td colspan="3">Total</td>
                                        <td colspan="2" class="text-right total-value">---</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                        <div class="cart-actions">
                            <button type="button" id="checkoutButton">Checkout Now</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <div class="payment-modal-overlay" hidden>
        <div class="payment-modal" role="dialog" aria-modal="true">
            <button type="button" class="modal-close" aria-label="Close details">×</button>
            <div class="modal-details">
                <h2 class="modal-title">Payment Options</h2>
                <p class="modal-description">Choose your preferred payment method.</p>
            </div>
            <div class="modal-actions">
                <button type="button" class="modal-action COD">Cash on Delivery</button>
                <button type="button" class="modal-action GCASH">Gcash Payment</button>
            </div>
            <div id="gcash-reference-input" hidden style="display: flex; align-items: center; gap: 10px; margin-top: 15px; padding: 0 20px;">
                <label for="payment-reference" style="font-weight: 500;">GCASH Reference Code:</label>
                <input type="text" id="payment-reference" placeholder="Enter GCASH reference code" style="flex: 1; padding: 5px; border: 1px solid #ddd; border-radius: 4px;" />
                <button type="button" class="modal-action" style="margin: 0; padding: 5px 15px;">Submit</button>
            </div>
        </div>
    </div>

    <script src="/global.js" defer></script>
    <script src="/store.js" defer></script>
</body>

</html>
