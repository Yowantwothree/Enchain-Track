<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/globals.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body id="store-order">
    <div class="dashboard">
        <header class="dashboard-header">
            <div class="header-logo">Enchain Track</div>
            <div class="header-actions">
                <div class="profile">
                    <div class="profile-name">User</div>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="dashboard-sidebar">
                <div class="nav-links">
                    <button class="link">
                        <img class="nav-img" src="/img/home.png" />
                        <div class="nav-title">Home</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/browse.png" />
                        <div class="nav-title">Browse</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/cart.png" />
                        <div class="nav-title">Cart</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/order.png" />
                        <div class="nav-title">Order</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/business.png" />
                        <div class="nav-title">Business</div>
                    </button>
                </div>
                <div class="navigation-indicator" style="top: calc(25px + 65px * 3);"></div>
                <!--Adjust top to: 25px + 65*(order of link - 1)-->
            </div>


            <div class="dashboard-main-data" style="padding: 25px">
                <div class="store-background">

                    <div class="home-deals">
                        <div class="category-title">
                            <p class="home-deal-title">Orders</p>
                        </div>

                        <div class="cart-table-wrapper">
                            <table class="product-table order-table">
                                <thead>
                                    <tr>
                                        <th>Order</th>
                                        <th>Items</th>
                                        <th>Total</th>
                                        <th>Status</th>
                                        <th>Date</th>
                                    </tr>
                                </thead>
                                <tbody id="ordersBody"></tbody>
                            </table>
                        </div>
                        <div class="cart-actions">
                            <div class="order-summary-note">Tap any order row to view the bundle items, quantity, price, and details.</div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>
    <div class="card-modal-overlay" hidden id="orderDetailsOverlay">
        <div class="card-modal" role="dialog" aria-modal="true">
            <button type="button" class="modal-close" aria-label="Close details">×</button>
            <div class="modal-details">
                <h2 class="modal-title" id="orderModalTitle">Order details</h2>
                <p class="modal-subtitle" id="orderModalStatus">Status: </p>
                <p class="modal-description" id="orderModalSummary">Order items and pricing appear below.</p>
            </div>
            <div class="order-items-header">
                <span>Item</span>
                <span class="text-center">Qty</span>
                <span class="text-right">Line Total</span>
            </div>
            <div class="order-items-list" id="orderItemsList"></div>
            <div class="modal-actions order-detail-totals">
                <div class="order-detail-row"><span>Subtotal</span><strong id="modalSubtotal">---</strong></div>
                <div class="order-detail-row"><span>Discount</span><strong id="modalDiscount">---</strong></div>
                <div class="order-detail-row"><span>Shipping</span><strong id="modalShipping">---</strong></div>
                <div class="order-detail-row order-detail-total"><span>Total</span><strong id="modalTotal">---</strong></div>
            </div>
        </div>
    </div>
    <script src="/global.js" defer></script>
    <script src="/store.js" defer></script>
</body>

</html>
