<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="/css/globals.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="dashboard">
        <header class="dashboard-header">
            <div class="header-logo">EnchainTrack</div>
            <div class="header-actions">
                <div class="profile">
                    <div class="profile-name"></div>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="dashboard-sidebar">
                <div class="nav-links">
                    <button class="link">
                        <img class="nav-img" src="/img/home.png" />
                        <div class="nav-title">Dashboard</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/inventory.png" />
                        <div class="nav-title">Inventory</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/browse.png" />
                        <div class="nav-title">Products</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/cart.png" />
                        <div class="nav-title">Sales</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/order.png" />
                        <div class="nav-title">Orders</div>
                    </button>
                    <button class="link">
                        <img class="nav-img" src="/img/business.png" />
                        <div class="nav-title">Supplier</div>
                    </button>
                </div>
                <div class="navigation-indicator" style="top: 285px;"></div> <!--Adjust top to: 25px + 65*(order of link - 1)-->
            </div>

            <div class="dashboard-main-data">
                <div class="title-line">
                    <div class="dashboard-title">Orders</div>
                </div>
                <div class="dashboard-table-card">
                    <div class="title-line">
                        <div class="table-title">Order List</div>
                    </div>
                    <div class="cart-table-wrapper">
                        <table class="product-table">
                            <thead>
                                <tr>
                                    <th data-type="number">Order</th>
                                    <th data-type="date">Date</th>
                                    <th data-type="text">Customer</th>
                                    <th data-type="text">Products</th>
                                    <th class="text-center" data-type="number">Items</th>
                                    <th data-type="text">Status</th>
                                </tr>
                            </thead>
                            <tbody id="ordersBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <!-- Admin order details modal -->
    <div class="card-modal-overlay" hidden id="adminOrderDetailsOverlay">
        <div class="card-modal" role="dialog" aria-modal="true">
            <button type="button" class="modal-close" aria-label="Close details">&times;</button>
            <div class="modal-details">
                <h2 class="modal-title" id="adminOrderModalTitle">Order details</h2>
                <p class="modal-subtitle" id="adminOrderModalStatus">Status:</p>
                <p class="modal-description" id="adminOrderModalSummary">Order items and pricing appear below.</p>
            </div>
            <div class="order-items-header">
                <span>Item</span>
                <span class="text-center">Qty</span>
                <span class="text-right">Line Total</span>
            </div>
            <div class="order-items-list" id="adminOrderItemsList"></div>
            <div class="modal-actions order-detail-totals">
                <div class="order-detail-row"><span>Subtotal</span><strong id="adminModalSubtotal">---</strong></div>
                <div class="order-detail-row"><span>Discount</span><strong id="adminModalDiscount">---</strong></div>
                <div class="order-detail-row"><span>Shipping</span><strong id="adminModalShipping">---</strong></div>
                <div class="order-detail-row order-detail-total"><span>Total</span><strong id="adminModalTotal">---</strong></div>
            </div>
        </div>
    </div>
    <script src="/dashboard.js?v=1" defer></script>
    <script src="/global.js" defer></script>
</body>

</html>
